services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hyper-unicorn
    ports:
      - "5432:5432"
    volumes:
      - ./.postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hyper-unicorn"]
      interval: 2s
      timeout: 3s
      retries: 20

  backend:
    image: node:20-alpine
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hyper-unicorn?schema=public
      PORT: "3001"
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        set -e
        apk add --no-cache bash openssl >/dev/null
        yarn install --frozen-lockfile
        yarn prisma generate
        yarn prisma migrate deploy
        yarn prisma:seed
        exec yarn start:dev

  frontend:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command:
      - sh
      - -c
      - |
        set -e
        yarn install --frozen-lockfile
        exec yarn dev

volumes:
  backend_node_modules:
  frontend_node_modules:
